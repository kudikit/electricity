name: Build and Deploy Kudikitgateway

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      # Step 1: Checkout code
      - name: Checkout code
        uses: actions/checkout@v3

      # Step 2: Login to Docker Hub
      - name: Login to Docker Hub
        run: echo "${{ secrets.DOCKER_PASSWORD }}" | docker login -u "${{ secrets.DOCKER_USERNAME }}" --password-stdin

      # Step 3: Build Docker image
      - name: Build Docker image
        run: |
          docker build -t ${{ secrets.DOCKER_USERNAME }}/electricity-service:latest -f Dockerfile.electricity .

      # Step 4: Push image to Docker Hub
      - name: Push Docker image
        run: |
          docker push ${{ secrets.DOCKER_USERNAME }}/electricity-service:latest

      # Step 5: SSH into server and deploy
      - name: SSH and deploy
        uses: appleboy/ssh-action@v0.1.7
        with:
          host: ${{ secrets.SERVER_IP }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            # Stop and remove old container
            docker rm -f electricity || true

            # Remove old image
            docker rmi -f ${{ secrets.DOCKER_USERNAME }}/electricity-service:latest || true

            # Pull latest image from Docker Hub
            docker pull ${{ secrets.DOCKER_USERNAME }}/electricity-service:latest

            # Run container using env file
            docker run -d \
              --name electricity \
              --network mysql_db_setup_kudikit-net \
              -p 8282:8282 \
              --env-file /home/devops/db-services/electricity/.env \
              ${{ secrets.DOCKER_USERNAME }}/electricity-service:latest
